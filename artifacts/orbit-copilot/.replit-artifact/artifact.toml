kind = "web"
previewPath = "/"
title = "Orbit Copilot"
version = "1.0.0"
id = "artifacts/orbit-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23406

[services.development]
run = "pnpm --filter @workspace/orbit-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orbit-copilot", "run", "build" ]
publicDir = "artifacts/orbit-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23406"
BASE_PATH = "/"
