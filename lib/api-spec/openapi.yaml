openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Orbit Copilot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: AI Copilot chat
  - name: wallet
    description: Wallet and assets
  - name: portfolio
    description: Portfolio tracking
  - name: defi
    description: DeFi opportunities
  - name: assets
    description: Asset discovery
  - name: transactions
    description: Transaction history
  - name: steldex
    description: Unicorn StelDex integration (Stellar Testnet AMM/farm/limit-order router)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get chat history (wallet-scoped when wallet is provided)
      parameters:
        - name: wallet
          in: query
          required: false
          schema:
            type: string
          description: Stellar G… public key — returns only that wallet's messages
      responses:
        "200":
          description: List of chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI copilot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/messages/{id}:
    delete:
      operationId: deleteChatMessage
      tags: [chat]
      summary: Delete a chat message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/clear:
    post:
      operationId: clearChatHistory
      tags: [chat]
      summary: Clear all chat history
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet info
      parameters:
        - name: publicKey
          in: query
          required: false
          description: Stellar public key — when provided fetches testnet wallet data; omit for demo testnet account
          schema:
            type: string
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/assets:
    get:
      operationId: getWalletAssets
      tags: [wallet]
      summary: List wallet assets/balances
      parameters:
        - name: publicKey
          in: query
          required: false
          description: Stellar public key for testnet lookup
          schema:
            type: string
      responses:
        "200":
          description: List of wallet asset balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletAsset"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get transaction history
      parameters:
        - name: publicKey
          in: query
          required: false
          description: Stellar public key for testnet lookup
          schema:
            type: string
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /wallet/build-transaction:
    post:
      operationId: buildTransaction
      tags: [wallet]
      summary: Build an unsigned Stellar transaction (payment or swap) for Freighter to sign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildTransactionInput"
      responses:
        "200":
          description: Unsigned transaction XDR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTransactionResult"
        "400":
          description: Invalid transaction request

  /wallet/submit-transaction:
    post:
      operationId: submitTransaction
      tags: [wallet]
      summary: Submit a Freighter-signed transaction to the Stellar network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTransactionInput"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitTransactionResult"

  /portfolio/unified:
    get:
      operationId: getUnifiedPortfolio
      tags: [portfolio]
      summary: Unified testnet portfolio (Horizon, Soroswap, StelDex, Blend)
      parameters:
        - name: publicKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unified portfolio payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Portfolio overview — totals, allocation, performance
      parameters:
        - name: publicKey
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /portfolio/activity:
    get:
      operationId: getRecentActivity
      tags: [portfolio]
      summary: Recent portfolio activity feed
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /defi/opportunities:
    get:
      operationId: getDefiOpportunities
      tags: [defi]
      summary: List DeFi yield opportunities
      responses:
        "200":
          description: DeFi opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DefiOpportunity"

  /defi/opportunities/{id}:
    get:
      operationId: getDefiOpportunity
      tags: [defi]
      summary: Get a DeFi opportunity detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: DeFi opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefiOpportunity"

  /assets:
    get:
      operationId: getAssets
      tags: [assets]
      summary: Discover tradeable assets on Stellar
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

  /assets/{code}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset detail
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /market/overview:
    get:
      operationId: getMarketOverview
      tags: [assets]
      summary: Market overview — top movers, trending assets
      responses:
        "200":
          description: Market overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketOverview"

  /steldex/contracts:
    get:
      operationId: getSteldexContracts
      tags: [steldex]
      summary: StelDex contract addresses, tokens, and pools (Stellar Testnet)
      responses:
        "200":
          description: Contracts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexContracts"

  /steldex/pools:
    get:
      operationId: getSteldexPools
      tags: [steldex]
      summary: All StelDex pools
      responses:
        "200":
          description: Pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SteldexPool"

  /steldex/farm-pools:
    get:
      operationId: getSteldexFarmPools
      tags: [steldex]
      summary: Farm pools + user LP/stake for a wallet
      parameters:
        - name: wallet
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Farm pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SteldexFarmPool"

  /steldex/farm-positions:
    get:
      operationId: getSteldexFarmPositions
      tags: [steldex]
      summary: User's staked farm positions
      parameters:
        - name: wallet
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Farm positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SteldexFarmPosition"

  /steldex/orders:
    get:
      operationId: getSteldexOrders
      tags: [steldex]
      summary: User's open limit orders
      parameters:
        - name: wallet
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SteldexOrder"

  /steldex/swap-quote:
    post:
      operationId: getSteldexSwapQuote
      tags: [steldex]
      summary: On-chain swap quote from StelDex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexSwapQuoteInput"
      responses:
        "200":
          description: Swap quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexSwapQuoteResult"
        "400":
          description: Invalid quote request

  /steldex/swap:
    post:
      operationId: postSteldexSwap
      tags: [steldex]
      summary: Build an unsigned StelDex swap transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexSwapInput"
      responses:
        "200":
          description: Unsigned transaction (single or multi-step)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid swap request

  /steldex/add-liquidity:
    post:
      operationId: postSteldexAddLiquidity
      tags: [steldex]
      summary: Build an unsigned add-liquidity transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexAddLiquidityInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/remove-liquidity:
    post:
      operationId: postSteldexRemoveLiquidity
      tags: [steldex]
      summary: Build an unsigned remove-liquidity transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexRemoveLiquidityInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/stake:
    post:
      operationId: postSteldexStake
      tags: [steldex]
      summary: Build an unsigned farm stake transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexStakeInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/claim:
    post:
      operationId: postSteldexClaim
      tags: [steldex]
      summary: Build an unsigned farm reward claim transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexClaimInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/unstake:
    post:
      operationId: postSteldexUnstake
      tags: [steldex]
      summary: Build an unsigned farm unstake transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexUnstakeInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/limit-order:
    post:
      operationId: postSteldexLimitOrder
      tags: [steldex]
      summary: Place a limit / stop-loss / take-profit order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexLimitOrderInput"
      responses:
        "200":
          description: Unsigned transaction or resting order confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

  /steldex/cancel-order:
    post:
      operationId: postSteldexCancelOrder
      tags: [steldex]
      summary: Cancel a resting limit order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteldexCancelOrderInput"
      responses:
        "200":
          description: Unsigned transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SteldexTxResult"
        "400":
          description: Invalid request

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
        metadata:
          type: ["object", "null"]
      required: [id, role, content, createdAt]

    ChatMessageInput:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        context:
          type: ["string", "null"]
          description: Connected wallet public key (G…) so the copilot can read balances and prepare txs
      required: [content]

    Wallet:
      type: object
      properties:
        id:
          type: integer
        address:
          type: string
        network:
          type: string
        totalValueUsd:
          type: number
        xlmBalance:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, address, network, totalValueUsd, xlmBalance, isActive, createdAt]

    WalletAsset:
      type: object
      properties:
        id:
          type: integer
        assetCode:
          type: string
        assetIssuer:
          type: ["string", "null"]
        balance:
          type: number
        valueUsd:
          type: number
        priceUsd:
          type: number
        change24h:
          type: number
        logoUrl:
          type: ["string", "null"]
      required: [id, assetCode, balance, valueUsd, priceUsd, change24h]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [send, receive, swap, yield, deposit, withdraw]
        assetCode:
          type: string
        amount:
          type: number
        valueUsd:
          type: number
        status:
          type: string
          enum: [pending, completed, failed]
        counterparty:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        hash:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, type, assetCode, amount, valueUsd, status, createdAt]

    BuildTransactionInput:
      type: object
      properties:
        type:
          type: string
          enum: [send, swap]
        sourcePublicKey:
          type: string
        sendAsset:
          type: string
        sendAmount:
          type: string
        destination:
          type: ["string", "null"]
          description: Required for type=send
        destAsset:
          type: ["string", "null"]
          description: Required for type=swap
      required: [type, sourcePublicKey, sendAsset, sendAmount]

    BuildTransactionResult:
      type: object
      properties:
        xdr:
          type: string
        networkPassphrase:
          type: string
        estimatedDestAmount:
          type: ["string", "null"]
        destMin:
          type: ["string", "null"]
      required: [xdr, networkPassphrase]

    SubmitTransactionInput:
      type: object
      properties:
        signedXdr:
          type: string
        networkPassphrase:
          type: string
      required: [signedXdr, networkPassphrase]

    SubmitTransactionResult:
      type: object
      properties:
        success:
          type: boolean
        hash:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
      required: [success]

    PortfolioSummary:
      type: object
      properties:
        totalValueUsd:
          type: number
        change24hUsd:
          type: number
        change24hPct:
          type: number
        change7dPct:
          type: number
        totalYieldEarned:
          type: number
        activePositions:
          type: integer
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/Allocation"
        performanceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PerformancePoint"
      required: [totalValueUsd, change24hUsd, change24hPct, change7dPct, totalYieldEarned, activePositions, allocations, performanceHistory]

    Allocation:
      type: object
      properties:
        assetCode:
          type: string
        pct:
          type: number
        valueUsd:
          type: number
        color:
          type: string
      required: [assetCode, pct, valueUsd, color]

    PerformancePoint:
      type: object
      properties:
        date:
          type: string
        valueUsd:
          type: number
      required: [date, valueUsd]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        description:
          type: string
        valueUsd:
          type: ["number", "null"]
        assetCode:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, type, title, description, createdAt]

    DefiOpportunity:
      type: object
      properties:
        id:
          type: integer
        protocol:
          type: string
        type:
          type: string
          enum: [lending, liquidity, staking, yield_farm]
        assetCode:
          type: string
        apy:
          type: number
        tvlUsd:
          type: number
        riskLevel:
          type: string
          enum: [low, medium, high]
        description:
          type: string
        minDeposit:
          type: number
        rewards:
          type: array
          items:
            type: string
      required: [id, protocol, type, assetCode, apy, tvlUsd, riskLevel, description, minDeposit, rewards]

    Asset:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        issuer:
          type: ["string", "null"]
        priceUsd:
          type: number
        change24h:
          type: number
        marketCapUsd:
          type: number
        volume24hUsd:
          type: number
        logoUrl:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high]
        isTrusted:
          type: boolean
      required: [code, name, priceUsd, change24h, marketCapUsd, volume24hUsd, riskLevel, isTrusted]

    MarketOverview:
      type: object
      properties:
        topGainers:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        topLosers:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        trending:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        totalMarketCapUsd:
          type: number
        stellarTvlUsd:
          type: number
      required: [topGainers, topLosers, trending, totalMarketCapUsd, stellarTvlUsd]

    SteldexContracts:
      type: object
      additionalProperties: true
      properties:
        factory:
          type: ["string", "null"]
        router:
          type: ["string", "null"]
        farm:
          type: ["string", "null"]
        orders:
          type: ["string", "null"]
        tokens:
          type: object
          additionalProperties:
            type: string
        pools:
          type: array
          items:
            type: object
            additionalProperties: true
        contractsReady:
          type: boolean
        sorobanRpc:
          type: ["string", "null"]
        networkPassphrase:
          type: ["string", "null"]
        network:
          type: ["string", "null"]

    SteldexPool:
      type: object
      additionalProperties: true
      properties:
        pair:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        token0:
          type: ["string", "null"]
        token1:
          type: ["string", "null"]
        symbol0:
          type: ["string", "null"]
        symbol1:
          type: ["string", "null"]

    SteldexFarmPool:
      type: object
      additionalProperties: true
      properties:
        pair:
          type: ["string", "null"]
        poolContract:
          type: ["string", "null"]
        token0Symbol:
          type: ["string", "null"]
        token1Symbol:
          type: ["string", "null"]
        tvlUsd:
          type: ["number", "null"]
        lpLiquidity:
          type: ["string", "null"]
        availableToStake:
          type: ["string", "null"]
        stakedLiquidity:
          type: ["string", "null"]
        tickLower:
          type: ["number", "null"]
        tickUpper:
          type: ["number", "null"]
        farm:
          type: object
          additionalProperties: true
          properties:
            weeklyStellar:
              type: ["string", "null"]
            weeklyStellarHuman:
              type: ["number", "null"]
            totalStaked:
              type: ["string", "null"]
            baseAprPercent:
              type: ["number", "null"]

    SteldexFarmPosition:
      type: object
      additionalProperties: true
      properties:
        poolContract:
          type: ["string", "null"]
        pair:
          type: ["string", "null"]
        tickLower:
          type: ["number", "null"]
        tickUpper:
          type: ["number", "null"]
        stake:
          type: object
          additionalProperties: true

    SteldexOrder:
      type: object
      additionalProperties: true
      properties:
        orderId:
          type: ["string", "null"]
        pair:
          type: ["string", "null"]
        status:
          type: ["string", "null"]

    SteldexSwapQuoteInput:
      type: object
      properties:
        fromTokenContract:
          type: string
        toTokenContract:
          type: string
        amountIn:
          type: string
        slippageBps:
          type: ["integer", "null"]
      required: [fromTokenContract, toTokenContract, amountIn]

    SteldexSwapQuoteResult:
      type: object
      additionalProperties: true
      properties:
        amountOut:
          type: ["string", "null"]
        minAmountOut:
          type: ["string", "null"]
        priceImpact:
          type: ["number", "null"]

    SteldexTxStep:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        label:
          type: ["string", "null"]
        xdr:
          type: ["string", "null"]

    SteldexTxResult:
      type: object
      additionalProperties: true
      properties:
        xdr:
          type: ["string", "null"]
        steps:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/SteldexTxStep"
        sequential:
          type: ["boolean", "null"]
        resting:
          type: ["boolean", "null"]

    SteldexSwapInput:
      type: object
      properties:
        walletAddress:
          type: string
