name: CD

# Continuous deployment gate. Production hosting is Vercel (see vercel.json).
# This workflow verifies the same build Vercel runs, then deploys when secrets exist.

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build-gate:
    name: Build gate (matches vercel.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --ignore-scripts

      - name: Production build
        run: pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/orbit-copilot run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-copilot-dist
          path: artifacts/orbit-copilot/dist/public
          if-no-files-found: error

  deploy-vercel:
    name: Deploy to Vercel
    needs: build-gate
    runs-on: ubuntu-latest
    # Avoid secrets.* in job-level if (can fail workflow parse when unset).
    # Steps no-op when VERCEL_TOKEN is missing.
    steps:
      - name: Check deploy secrets
        id: secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Vercel Actions deploy (secrets not set). Primary CD remains Vercel Git integration."
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.ready == 'true'

      - name: Install Vercel CLI
        if: steps.secrets.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        if: steps.secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build on Vercel
        if: steps.secrets.outputs.ready == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt
        if: steps.secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-status:
    name: CD status
    needs: [build-gate, deploy-vercel]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        run: |
          echo "Build gate: ${{ needs.build-gate.result }}"
          echo "Vercel deploy job: ${{ needs.deploy-vercel.result }}"
          echo "Primary CD path: Vercel Git integration on push to main (vercel.json)."
          echo "Optional Actions deploy runs when VERCEL_TOKEN / ORG / PROJECT secrets are set."
